name: Hermes Agent — Telegram + Local (all tools)

on:
  workflow_dispatch:        # triggered manually or by cron-job.org via GitHub API

concurrency:
  group: hermes-agent
  cancel-in-progress: false   # if a trigger fires while running, queue it

env:
  # OpenRouter slug for Tencent Hy3 free tier. If your Hermes build wants the
  # raw slug, use "tencent/hy3:free" instead. Verify with: hermes models
  HERMES_MODEL: "openrouter/tencent/hy3:free"
  RUN_MINUTES: 330            # gateway runtime before graceful shutdown + state save
  HERMES_HOME: /home/runner/.hermes
  DATA_REPO: jahid12525/harmesprivatestorage   # PRIVATE data-storage repo

jobs:
  hermes:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # ── 1. Pull ALL Hermes data from private repo (+ reassemble chunked files) ──
      - name: Pull Hermes data from private data repo
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/${DATA_REPO}.git" \
            "$HERMES_HOME" || mkdir -p "$HERMES_HOME"
          # Never trust a committed .env — it gets rebuilt from secrets below
          rm -f "$HERMES_HOME/.env"

          # Reassemble any files that were split into <100MB chunks on push
          find "$HERMES_HOME" -name "*.gh-chunk.000" | while read -r first; do
            base="${first%.gh-chunk.000}"
            cat "$base".gh-chunk.* > "$base"
            rm -f "$base".gh-chunk.*
            echo "Reassembled: $base"
          done

          echo "Restored $(du -sh "$HERMES_HOME" 2>/dev/null | cut -f1) of Hermes data"

      # ── 2. Install Hermes Agent (CLI-only installer) ──
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # ── 3. Free search backend: self-hosted SearXNG (JSON API enabled) ──
      - name: Start SearXNG (free web search backend)
        run: |
          mkdir -p "$PWD/searxng"
          SECRET=$(openssl rand -hex 32)
          cat > "$PWD/searxng/settings.yml" <<EOF
          use_default_settings: true
          server:
            secret_key: "${SECRET}"
            limiter: false
          search:
            formats:
              - html
              - json
          EOF
          docker run -d --name searxng -p 8080:8080 \
            -v "$PWD/searxng:/etc/searxng" \
            searxng/searxng:latest
          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:8080/search?q=test&format=json" >/dev/null 2>&1; then
              echo "SearXNG JSON API is up"; exit 0
            fi
            sleep 2
          done
          echo "SearXNG JSON API failed to start"; docker logs searxng; exit 1

      # ── 4. Camoufox stealth browser (headless server) ──
      - name: Install & start Camoufox
        run: |
          pip install -U "camoufox[geoip]"
          python -m camoufox fetch
          nohup python -c "from camoufox.server import launch_server; launch_server(headless=True, port=9222, ws_path='hermes')" \
            > camoufox.log 2>&1 &
          for i in $(seq 1 30); do
            (exec 3<>/dev/tcp/127.0.0.1/9222) 2>/dev/null && { echo "Camoufox is up"; break; }
            sleep 2
          done

      # ── 5. Secrets → ~/.hermes/.env (rebuilt fresh every run, never committed) ──
      # Free-only: no FAL_KEY (image gen removed), no ELEVENLABS_API_KEY (Edge TTS).
      # GROQ_API_KEY is optional — free tier, makes voice transcription fast.
      - name: Write Hermes .env
        run: |
          mkdir -p "$HERMES_HOME"
          cat > "$HERMES_HOME/.env" <<EOF
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS=${{ secrets.TELEGRAM_USER_ID }}
          SEARXNG_URL=http://localhost:8080
          CAMOUFOX_URL=ws://127.0.0.1:9222/hermes
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          EOF
          chmod 600 "$HERMES_HOME/.env"

      # ── 6. Non-secret config → config.yaml (persisted to data repo automatically) ──
      - name: Configure Hermes (model, search, TTS, tools)
        run: |
          hermes config set model "$HERMES_MODEL"
          hermes config set web.search_backend searxng

          # Free TTS: Microsoft Edge TTS (default provider, no API key)
          hermes config set tts.provider edge

          # Toolsets: image_gen removed (FAL-only, paid). tts kept (Edge is free).
          # Verify exact toolset names on your version with: hermes tools
          hermes config set toolsets '["terminal","files","web","browser","code","vision","tts","memory","skills","delegation","cron"]'
          hermes doctor || true

      # ── 7. Start periodic mid-run backup (every 30 min → 'backup' branch) ──
      # Insurance against runner death: worst-case data loss drops to ~30 min.
      - name: Start periodic data backup
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          cat > /tmp/sync.sh <<'SYNC'
          #!/bin/bash
          cd "$HERMES_HOME" || exit 0
          TMP=$(mktemp -d)
          rsync -a --exclude '.env' --exclude '.git' --exclude '*.log' ./ "$TMP/"
          cd "$TMP"
          find . -type f -size +90M ! -name "*.gh-chunk.*" | while read -r f; do
            split -b 90M -d -a 3 "$f" "$f.gh-chunk."; rm "$f"
          done
          git init -q -b backup
          git config user.name hermes-runner
          git config user.email hermes-runner@users.noreply.github.com
          git remote add origin "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git"
          git add -A && git commit -qm "mid-run backup $(date -u +%H:%M)" && git push -qf origin backup
          rm -rf "$TMP"
          SYNC
          chmod +x /tmp/sync.sh
          nohup bash -c 'while true; do sleep 1800; /tmp/sync.sh; done' > /tmp/sync.log 2>&1 &
          echo "Backup loop started"

      # ── 8. Notify: bot online ──
      - name: Notify bot online (Telegram)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_USER_ID}" \
            -d text="🟢 Hermes online (run ${{ github.run_id }}, up for ~${RUN_MINUTES} min)" > /dev/null || true

      # ── 9. Run the Telegram gateway with crash auto-restart ──
      # If hermes crashes, restart it within the remaining time budget.
      # -k 60: give Hermes 60s after SIGTERM to flush state before SIGKILL.
      - name: Run Hermes gateway (Telegram bot)
        run: |
          END=$(( $(date +%s) + RUN_MINUTES * 60 ))
          while [ "$(date +%s)" -lt "$END" ]; do
            REMAIN=$(( (END - $(date +%s)) / 60 ))
            [ "$REMAIN" -lt 2 ] && break
            timeout -k 60 "${REMAIN}m" hermes gateway || true
            echo "Gateway exited — restarting in 10s ($REMAIN min budget left)"
            sleep 10
          done

      # ── 10. Push ALL Hermes data back (+ split files >90MB into chunks) ──
      # Snapshot-style: fresh single commit force-pushed each run, so the data
      # repo never accumulates history/bloat from binary session files.
      # Runs even on failure/cancel (if: always()) so state is saved.
      - name: Push Hermes data to private data repo
        if: always()
        run: |
          cd "$HERMES_HOME"
          # Scrub anything secret before committing
          rm -f .env
          rm -rf .git
          cat > .gitignore <<'EOF'
          .env
          *.log
          EOF

          # GitHub rejects files >100MB. Split anything >90MB into 90MB chunks.
          find . -type f -size +90M ! -name "*.gh-chunk.*" | while read -r f; do
            split -b 90M -d -a 3 "$f" "$f.gh-chunk."
            rm "$f"
            echo "Chunked: $f"
          done

          git init -b main
          git config user.name "hermes-runner"
          git config user.email "hermes-runner@users.noreply.github.com"
          git remote add origin \
            "https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/${DATA_REPO}.git"
          git add -A
          git commit -m "hermes data sync $(date -u +'%Y-%m-%dT%H:%M:%SZ') (run ${{ github.run_id }})" || echo "Nothing to commit"
          git push --force origin main

      # ── 11. Notify: run failed ──
      - name: Notify failure (Telegram)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_USER_ID}" \
            -d text="🔴 Hermes run ${{ github.run_id }} FAILED — check Actions logs" > /dev/null || true
