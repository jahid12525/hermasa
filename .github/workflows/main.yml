name: Hermes Agent — Telegram + NVIDIA + AgentRouter (all tools)

on:
  workflow_dispatch:
    inputs:
      nvidia_models:
        description: "NVIDIA models (comma-separated, priority order; empty = skip NVIDIA)"
        required: false
        default: ""
      agentrouter_models:
        description: "AgentRouter OpenAI models (comma-separated; empty = skip)"
        required: false
        default: "gpt-5.5,glm-5.2"
      agentrouter_claude_models:
        description: "AgentRouter Claude models (comma-separated, Anthropic API; empty = skip)"
        required: false
        default: "claude-opus-4-8,claude-opus-4-7,claude-opus-4-6"

concurrency:
  group: hermes-agent
  cancel-in-progress: false

env:
  RUN_MINUTES: 330
  HERMES_HOME: /home/runner/.hermes
  DATA_REPO: jahid12525/harmesprivatestorage
  NVIDIA_MODELS: ${{ inputs.nvidia_models }}
  AGENTROUTER_MODELS: ${{ inputs.agentrouter_models }}
  AGENTROUTER_CLAUDE_MODELS: ${{ inputs.agentrouter_claude_models }}

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # ── 1. Pull persisted data from private repo ──
      - name: Pull data repo
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          date +%s > /tmp/job_start
          mkdir -p "$HERMES_HOME"
          git clone --depth 1 "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git" /tmp/data || true
          if [ -d /tmp/data ]; then
            rm -f /tmp/data/.env
            rsync -a --exclude='.git' /tmp/data/ "$HERMES_HOME/" || true
            find "$HERMES_HOME" -name "*.gh-chunk.000" | while read -r first; do
              base="${first%.gh-chunk.000}"
              cat "${base}".gh-chunk.* > "$base"
              rm -f "${base}".gh-chunk.*
              echo "Reassembled: $base"
            done
          fi

      # ── 2. Install Hermes Agent ──
      - name: Install Hermes Agent
        run: |
          rm -rf "$HERMES_HOME/hermes-agent"
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ── 3. Start SearXNG (free web search) ──
      - name: Start SearXNG
        run: |
          mkdir -p /tmp/searxng
          cat > /tmp/searxng/settings.yml <<'EOF'
          use_default_settings: true
          server:
            secret_key: "hermes-searxng-secret"
            limiter: false
          search:
            formats:
              - html
              - json
          EOF
          docker run -d --name searxng -p 8080:8080 \
            -v /tmp/searxng:/etc/searxng \
            searxng/searxng:latest
          echo "Waiting for SearXNG..."
          for i in $(seq 1 30); do
            if curl -s "http://localhost:8080/search?q=test&format=json" | grep -q results; then
              echo "SearXNG is ready"; exit 0
            fi
            sleep 2
          done
          echo "SearXNG failed to start"; exit 1

      # ── 4. Start Camoufox (stealth browser) ──
      - name: Start Camoufox
        run: |
          pip install -U "camoufox[geoip]"
          python3 -m camoufox fetch
          nohup python3 -c "
          from camoufox.server import launch_server
          launch_server(headless=True, port=9222, ws_path='hermes')
          " > /tmp/camoufox.log 2>&1 &
          sleep 20
          echo "Camoufox launched"

      # ── 5. Write .env (NVIDIA + AgentRouter keys) ──
      - name: Write .env
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AGENTROUTER_API_KEY: ${{ secrets.AGENTROUTER_API_KEY }}
        run: |
          mkdir -p "$HERMES_HOME"
          cat > "$HERMES_HOME/.env" <<EOF
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_ALLOWED_USERS=${TELEGRAM_USER_ID}
          SEARXNG_URL=http://localhost:8080
          CAMOUFOX_URL=ws://127.0.0.1:9222/hermes
          NVIDIA_API_KEY=${NVIDIA_API_KEY}
          GROQ_API_KEY=${GROQ_API_KEY}
          AGENTROUTER_API_KEY=${AGENTROUTER_API_KEY}
          EOF

      # ── 5.5 Start multi-provider rotation proxy (pure stdlib, no 3rd-party) ──
      # NVIDIA (OpenAI-compat) + AgentRouter (OpenAI-compat) + AgentRouter Claude
      # (Anthropic Messages API, translated to/from OpenAI format).
      - name: Start model rotator
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          AGENTROUTER_API_KEY: ${{ secrets.AGENTROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          cat > /tmp/rotator.py <<'PYEOF'
          #!/usr/bin/env python3
          """Multi-provider rotation proxy for Hermes Agent — pure stdlib.
          NVIDIA (OpenAI-compat) + AgentRouter (OpenAI-compat) + AgentRouter Claude
          (Anthropic Messages, translated to/from OpenAI format).
          Rotates on rate limit, 10-min cooldown, Telegram notices."""
          import json, os, time, threading
          import urllib.parse, urllib.request, urllib.error
          from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

          NV_UPSTREAM = "https://integrate.api.nvidia.com"
          AR_UPSTREAM = "https://agentrouter.org"

          NV_KEY = os.environ.get("NVIDIA_API_KEY", "")
          AR_KEY = os.environ.get("AGENTROUTER_API_KEY", "")

          def _split(name):
              return [m.strip() for m in os.environ.get(name, "").split(",") if m.strip()]

          NV_MODELS = _split("NVIDIA_MODELS") if NV_KEY else []
          AR_OAI    = _split("AGENTROUTER_MODELS") if AR_KEY else []
          AR_CLAUDE = _split("AGENTROUTER_CLAUDE_MODELS") if AR_KEY else []

          MODELS = NV_MODELS + AR_OAI + AR_CLAUDE

          # model -> (upstream, api_key, owner, api_kind)
          PROVIDERS = {}
          for _m in NV_MODELS: PROVIDERS[_m] = (NV_UPSTREAM, NV_KEY, "nvidia", "openai")
          for _m in AR_OAI:    PROVIDERS[_m] = (AR_UPSTREAM, AR_KEY, "agentrouter", "openai")
          for _m in AR_CLAUDE: PROVIDERS[_m] = (AR_UPSTREAM, AR_KEY, "agentrouter", "anthropic")

          COOLDOWN  = int(os.environ.get("MODEL_COOLDOWN_SECONDS", "600"))  # 10 minutes
          PORT      = int(os.environ.get("ROTATOR_PORT", "8765"))
          TG_TOKEN  = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          TG_CHAT   = os.environ.get("TELEGRAM_USER_ID", "")
          ROTATE_ON = {429, 500, 502, 503, 529}  # 529 = Anthropic "overloaded"

          _lock = threading.Lock()
          _cooldown_until = {}          # model -> epoch seconds when usable again
          _last_tg = {"text": None, "ts": 0.0}

          def tg_send(text):
              if not TG_TOKEN or not TG_CHAT:
                  return
              with _lock:
                  now = time.time()
                  if _last_tg["text"] == text and now - _last_tg["ts"] < 60:
                      return                     # don't spam identical messages
                  _last_tg["text"], _last_tg["ts"] = text, now
              try:
                  data = urllib.parse.urlencode({"chat_id": TG_CHAT, "text": text}).encode()
                  urllib.request.urlopen(urllib.request.Request(
                      "https://api.telegram.org/bot%s/sendMessage" % TG_TOKEN, data=data), timeout=10)
              except Exception:
                  pass

          def model_order(preferred):
              order = []
              if preferred and preferred in PROVIDERS:
                  order.append(preferred)       # /model choice in Telegram = top priority
              for m in MODELS:
                  if m not in order:
                      order.append(m)
              return order

          def usable(m):
              with _lock:
                  return _cooldown_until.get(m, 0) <= time.time()

          def mark_limited(m, seconds):
              with _lock:
                  _cooldown_until[m] = time.time() + seconds

          # ── OpenAI -> Anthropic Messages request translation ──
          def oa_to_anthropic(p, model):
              system_parts = []
              msgs = []
              for m in p.get("messages", []):
                  role = m.get("role")
                  content = m.get("content")
                  if role == "system":
                      if isinstance(content, list):
                          content = "".join(c.get("text", "") for c in content if isinstance(c, dict))
                      system_parts.append(content or "")
                  elif role == "tool":
                      msgs.append({"role": "user", "content": [{
                          "type": "tool_result",
                          "tool_use_id": m.get("tool_call_id") or "",
                          "content": content if isinstance(content, str) else json.dumps(content),
                      }]})
                  elif role == "assistant":
                      blocks = []
                      if content:
                          blocks.append({"type": "text", "text": content if isinstance(content, str) else json.dumps(content)})
                      for tc in m.get("tool_calls") or []:
                          fn = tc.get("function") or {}
                          try:
                              args = json.loads(fn.get("arguments") or "{}")
                          except Exception:
                              args = {}
                          blocks.append({"type": "tool_use", "id": tc.get("id") or "",
                                         "name": fn.get("name") or "", "input": args})
                      msgs.append({"role": "assistant", "content": blocks or [{"type": "text", "text": ""}]})
                  else:  # user
                      msgs.append({"role": "user",
                                   "content": content if isinstance(content, str) else json.dumps(content)})
              body = {"model": model,
                      "max_tokens": p.get("max_tokens") or p.get("max_completion_tokens") or 8192,
                      "messages": msgs}
              if system_parts:
                  body["system"] = "\n\n".join(s for s in system_parts if s)
              if p.get("temperature") is not None:
                  body["temperature"] = p["temperature"]
              if p.get("top_p") is not None:
                  body["top_p"] = p["top_p"]
              stop = p.get("stop")
              if stop:
                  body["stop_sequences"] = stop if isinstance(stop, list) else [stop]
              tools = []
              for t in p.get("tools") or []:
                  if t.get("type") == "function":
                      fn = t.get("function") or {}
                      tools.append({"name": fn.get("name") or "",
                                    "description": fn.get("description") or "",
                                    "input_schema": fn.get("parameters") or {"type": "object", "properties": {}}})
              if tools:
                  tc = p.get("tool_choice")
                  if tc == "none":
                      pass                        # drop tools entirely
                  else:
                      body["tools"] = tools
                      if tc == "required":
                          body["tool_choice"] = {"type": "any"}
                      elif isinstance(tc, dict) and tc.get("type") == "function":
                          body["tool_choice"] = {"type": "tool", "name": tc.get("function", {}).get("name", "")}
                      else:
                          body["tool_choice"] = {"type": "auto"}
              return body

          # ── Anthropic response -> OpenAI chat.completion translation ──
          def anthropic_to_oa(r):
              text = ""
              tool_calls = []
              for blk in r.get("content") or []:
                  if blk.get("type") == "text":
                      text += blk.get("text", "")
                  elif blk.get("type") == "tool_use":
                      tool_calls.append({"id": blk.get("id") or "",
                                         "type": "function",
                                         "function": {"name": blk.get("name") or "",
                                                      "arguments": json.dumps(blk.get("input") or {})}})
              finish = {"end_turn": "stop", "max_tokens": "length",
                        "tool_use": "tool_calls", "stop_sequence": "stop"}.get(r.get("stop_reason"), "stop")
              msg = {"role": "assistant", "content": text or None}
              if tool_calls:
                  msg["tool_calls"] = tool_calls
              usage = r.get("usage") or {}
              pt = usage.get("input_tokens", 0)
              ct = usage.get("output_tokens", 0)
              return {"id": r.get("id") or "chatcmpl-anthropic",
                      "object": "chat.completion",
                      "created": int(time.time()),
                      "model": r.get("model") or "",
                      "choices": [{"index": 0, "message": msg, "finish_reason": finish}],
                      "usage": {"prompt_tokens": pt, "completion_tokens": ct, "total_tokens": pt + ct}}

          class Handler(BaseHTTPRequestHandler):
              def log_message(self, fmt, *args):
                  print("[rotator]", fmt % args, flush=True)

              def _send(self, code, body, ctype="application/json"):
                  self.send_response(code)
                  self.send_header("Content-Type", ctype)
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def _send_oa_stream(self, oa, model):
                  """Emit a complete OpenAI response as a short SSE stream."""
                  self.send_response(200)
                  self.send_header("Content-Type", "text/event-stream")
                  self.send_header("Cache-Control", "no-cache")
                  self.send_header("X-Rotator-Model", model)
                  self.end_headers()
                  msg = oa["choices"][0]["message"]
                  finish = oa["choices"][0]["finish_reason"]
                  delta = {"role": "assistant"}
                  if msg.get("content"):
                      delta["content"] = msg["content"]
                  if msg.get("tool_calls"):
                      delta["tool_calls"] = [dict(tc, index=i) for i, tc in enumerate(msg["tool_calls"])]
                  base = {"id": oa["id"], "object": "chat.completion.chunk",
                          "created": oa["created"], "model": oa["model"]}
                  chunks = [dict(base, choices=[{"index": 0, "delta": delta, "finish_reason": None}]),
                            dict(base, choices=[{"index": 0, "delta": {}, "finish_reason": finish}],
                                 usage=oa.get("usage"))]
                  try:
                      for c in chunks:
                          self.wfile.write(b"data: " + json.dumps(c).encode() + b"\n\n")
                      self.wfile.write(b"data: [DONE]\n\n")
                      self.wfile.flush()
                  except (BrokenPipeError, ConnectionResetError):
                      pass

              def do_GET(self):
                  if self.path.rstrip("/").endswith("/models"):
                      body = json.dumps({"object": "list", "data": [
                          {"id": m, "object": "model", "owned_by": PROVIDERS[m][2]} for m in MODELS
                      ]}).encode()
                      self._send(200, body)
                      return
                  self._proxy(None)

              def do_POST(self):
                  length = int(self.headers.get("Content-Length") or 0)
                  raw = self.rfile.read(length) if length else b""
                  self._proxy(raw)

              def _proxy(self, raw):
                  payload = None
                  if raw:
                      try:
                          payload = json.loads(raw.decode("utf-8"))
                      except Exception:
                          payload = None
                  preferred = payload.get("model") if isinstance(payload, dict) else None
                  if preferred and preferred not in PROVIDERS:
                      # Stale/unknown model (e.g. restored old session) -> force pool model
                      print("[rotator] requested model '%s' NOT in pool; overriding with '%s'"
                            % (preferred, MODELS[0]), flush=True)
                  order = model_order(preferred)
                  is_chat = isinstance(payload, dict) and "messages" in payload

                  while True:
                      avail = [m for m in order if usable(m)]

                      # ── All models exhausted: cooldown, task NOT lost ──
                      if not avail:
                          with _lock:
                              soonest = min(_cooldown_until.get(m, 0) for m in order)
                          wait = max(5, min(soonest - time.time(), COOLDOWN))
                          tg_send("\u23f3 All models (NVIDIA + AgentRouter) hit rate limits. "
                                  "Waiting for cooldown \u2014 your task will continue automatically, nothing is lost.")
                          print("[rotator] all models cooling, sleeping %ds" % wait, flush=True)
                          time.sleep(wait)
                          tg_send("\u2705 Cooldown finished \u2014 resuming your task now.")
                          continue

                      model = avail[0]
                      upstream, key, owner, api = PROVIDERS[model]  # pool models only, no fallback
                      anthropic_mode = (api == "anthropic" and is_chat)

                      if anthropic_mode:
                          a_body = oa_to_anthropic(payload, model)
                          body = json.dumps(a_body).encode("utf-8")
                          req = urllib.request.Request(upstream + "/v1/messages",
                                                       data=body, method="POST")
                          req.add_header("x-api-key", key)
                          req.add_header("anthropic-version", "2023-06-01")
                          req.add_header("Content-Type", "application/json")
                      else:
                          if isinstance(payload, dict) and "model" in payload:
                              payload["model"] = model
                              body = json.dumps(payload).encode("utf-8")
                          else:
                              body = raw or None
                          req = urllib.request.Request(upstream + self.path,
                                                       data=body, method=self.command)
                          req.add_header("Authorization", "Bearer " + key)
                          req.add_header("Content-Type",
                                         self.headers.get("Content-Type") or "application/json")
                          if self.headers.get("Accept"):
                              req.add_header("Accept", self.headers["Accept"])

                      try:
                          resp = urllib.request.urlopen(req, timeout=900)
                      except urllib.error.HTTPError as e:
                          if e.code in ROTATE_ON:
                              retry = COOLDOWN
                              ra = e.headers.get("Retry-After") if e.headers else None
                              if ra and ra.isdigit():
                                  retry = max(int(ra), 30)
                              mark_limited(model, retry)
                              nxt = [m for m in order if usable(m)]
                              if nxt:
                                  tg_send("\u26a0\ufe0f Model '%s' rate-limited (HTTP %d). "
                                          "Switching to '%s' \u2014 task continues."
                                          % (model, e.code, nxt[0]))
                              print("[rotator] %s -> HTTP %d, cooling %ds" % (model, e.code, retry), flush=True)
                              continue                       # retry same request on next model
                          try:
                              err = e.read()
                          except Exception:
                              err = b'{"error":"upstream error"}'
                          self._send(e.code, err)
                          return
                      except Exception as e:
                          mark_limited(model, 30)            # brief network hiccup
                          print("[rotator] network error on %s: %s" % (model, e), flush=True)
                          continue

                      # ── Success: Anthropic -> translate back to OpenAI format ──
                      if anthropic_mode:
                          try:
                              data = json.loads(resp.read().decode("utf-8"))
                          except Exception:
                              self._send(502, b'{"error":"bad anthropic response"}')
                              return
                          finally:
                              try:
                                  resp.close()
                              except Exception:
                                  pass
                          oa = anthropic_to_oa(data)
                          oa["model"] = model
                          if payload.get("stream"):
                              self._send_oa_stream(oa, model)
                          else:
                              out = json.dumps(oa).encode("utf-8")
                              self.send_response(200)
                              self.send_header("Content-Type", "application/json")
                              self.send_header("Content-Length", str(len(out)))
                              self.send_header("X-Rotator-Model", model)
                              self.end_headers()
                              self.wfile.write(out)
                          return

                      # ── Success: OpenAI-compatible stream passthrough (SSE-safe) ──
                      self.send_response(resp.status)
                      self.send_header("Content-Type", resp.headers.get("Content-Type", "application/json"))
                      self.send_header("X-Rotator-Model", model)
                      self.end_headers()
                      try:
                          while True:
                              chunk = resp.read(8192)
                              if not chunk:
                                  break
                              self.wfile.write(chunk)
                              self.wfile.flush()
                      except (BrokenPipeError, ConnectionResetError):
                          pass
                      finally:
                          try:
                              resp.close()
                          except Exception:
                              pass
                      return

          if __name__ == "__main__":
              if not MODELS:
                  raise SystemExit("No models configured — fill at least one model input field")
              print("[rotator] rotation pool:",
                    [(m, PROVIDERS[m][2], PROVIDERS[m][3]) for m in MODELS], flush=True)
              ThreadingHTTPServer(("127.0.0.1", PORT), Handler).serve_forever()
          PYEOF

          nohup python3 /tmp/rotator.py > /tmp/rotator.log 2>&1 &
          sleep 2
          curl -sf http://127.0.0.1:8765/v1/models > /dev/null \
            && echo "Rotator proxy is up on :8765" \
            || (cat /tmp/rotator.log; exit 1)

      # ── 6. Configure Hermes (all traffic via rotation proxy) ──
      - name: Configure Hermes
        run: |
          hermes config unset providers.nim.base_url || true
          hermes config unset providers.nim.api_key_env || true
          hermes config set model.provider "nvidia"
          # Route ALL model traffic through the local rotator proxy:
          hermes config set model.base_url "http://127.0.0.1:8765/v1" || true
          hermes config set providers.nvidia.base_url "http://127.0.0.1:8765/v1" || true
          # Default model = first model across all input lists (NO built-in fallback):
          FIRST_MODEL="$(echo "$NVIDIA_MODELS,$AGENTROUTER_MODELS,$AGENTROUTER_CLAUDE_MODELS" | tr ',' '\n' | grep -v '^$' | head -1)"
          if [ -z "$FIRST_MODEL" ]; then
            echo "ERROR: all model input fields are empty — nothing to run"; exit 1
          fi
          # Clear any model choice persisted in the data repo from previous runs:
          hermes config unset model.default || true
          hermes config unset model.name || true
          hermes config set model.default "$FIRST_MODEL"
          echo "Default model enforced: $FIRST_MODEL"
          hermes config set web.search_backend searxng
          hermes config set tts.provider edge
          hermes config set toolsets '["terminal","files","web","browser","code","vision","tts","memory","skills","delegation","cron"]'
          hermes doctor || true
          echo "── Final model config ──"
          hermes config get model || true

      # ── 7. Background backup loop (every 30 min -> backup branch) ──
      - name: Start backup loop
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          cat > /tmp/sync.sh <<'EOF'
          #!/bin/bash
          while true; do
            sleep 1800
            rm -rf /tmp/backup && mkdir -p /tmp/backup
            rsync -a --exclude='.env' --exclude='.git' --exclude='*.log' --exclude='hermes-agent' "$HERMES_HOME/" /tmp/backup/
            cd /tmp/backup
            find . -type f -size +90M | while read -r f; do
              split -b 90M -d -a 3 "$f" "$f.gh-chunk."
              rm -f "$f"
            done
            git init -q -b backup
            git config user.email "bot@hermes" && git config user.name "hermes-bot"
            git add -A && git commit -q -m "backup $(date -u +%FT%TZ)" || true
            git push -f "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git" backup 2>/dev/null || true
            echo "Backup pushed at $(date)"
          done
          EOF
          chmod +x /tmp/sync.sh
          HERMES_HOME="$HERMES_HOME" DATA_REPO="$DATA_REPO" DATA_REPO_TOKEN="$DATA_REPO_TOKEN" nohup /tmp/sync.sh > /tmp/sync.log 2>&1 &

      # ── 8. Notify start on Telegram ──
      - name: Notify start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          TG_API="https://api.telegram.org"
          curl -s -X POST "${TG_API}/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_USER_ID}" \
            -d text="🟢 Hermes Agent ONLINE — rotation pool: NVIDIA[${NVIDIA_MODELS}] + AgentRouter[${AGENTROUTER_MODELS}] + Claude[${AGENTROUTER_CLAUDE_MODELS}]" > /dev/null

      # ── 9. Run gateway with time budget ──
      - name: Run Hermes gateway
        run: |
          JOB_START=$(cat /tmp/job_start)
          END=$(( JOB_START + RUN_MINUTES * 60 ))
          while true; do
            NOW=$(date +%s)
            REMAIN=$(( (END - NOW) / 60 ))
            if [ "$REMAIN" -le 2 ]; then
              echo "Time budget exhausted"; break
            fi
            echo "Starting gateway (${REMAIN}m remaining)..."
            timeout -k 60 "${REMAIN}m" hermes gateway || true
            echo "Gateway exited, restarting in 10s..."
            sleep 10
          done

      # ── 10. Final push to data repo (main) ──
      - name: Final data push
        if: always()
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          rm -rf /tmp/final && mkdir -p /tmp/final
          rsync -a --exclude='.env' --exclude='.git' --exclude='*.log' --exclude='hermes-agent' "$HERMES_HOME/" /tmp/final/ || true
          cd /tmp/final
          find . -type f -size +90M | while read -r f; do
            split -b 90M -d -a 3 "$f" "$f.gh-chunk."
            rm -f "$f"
          done
          cat > .gitignore <<'EOF'
          .env
          *.log
          EOF
          git init -q -b main
          git config user.email "bot@hermes" && git config user.name "hermes-bot"
          git add -A && git commit -q -m "final save $(date -u +%FT%TZ)" || true
          git push -f "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git" main

      # ── 11. Notify failure ──
      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          TG_API="https://api.telegram.org"
          curl -s -X POST "${TG_API}/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_USER_ID}" \
            -d text="🔴 Hermes Agent run FAILED — check Actions logs" > /dev/null
